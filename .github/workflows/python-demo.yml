name: CXF Python Demo Suite

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  demo-suite:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show repository tree
        run: |
          pwd
          ls
          ls demo || true
          ls demo/python || true
          find demo -maxdepth 3 -type f | sort || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: demo/python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CXF demo example suite
        working-directory: demo/python
        run: |
          python ./run_examples.py
